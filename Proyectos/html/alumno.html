<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel= "stylesheet"href="./css/alumno.css">

       <!-- <img class="logo"id="compu"alt ="logo"src="./img/logo_compu.png">-->
        <img class="logo"id=keep-on alt="logo"src="./img/COMPUTADORA.png">
        <img id="lupa" src="./img/lupa.png">
        <input id="buscador" type="text" placeholder="Busca algo aquí">
        <img id="user"src="./img/user.png">

        <article id="barra_lateral">
            <section  id="primero_barra_lateral"></section>
            <section id="segundo_barra_lateral"class="bloque_linea">
                <a class="enlace"href="./actividades.html">

                </a>

                <h4>&emsp;-Por entregar</h4>
            </section>
            <section class="bloque_linea">
                <a class="enlace"href="./formulario_evaluacion.html">
                    <h3>FORMULARIO DE<br>EVALUACIÓN</h3>
            </a>
            </section>
            <section class="bloque_linea">
                <a class="enlace"href="./recursos_apoyo.html">

            </section>
            <section class="bloque_linea">
                <h3>CONTACTA A TU<br>PROFESOR</h3>

            <section class="bloque_linea">

    <seccion id="primero">

            </div>

    <seccion id="segundo">

        </div>

    <seccion id="tercero">
